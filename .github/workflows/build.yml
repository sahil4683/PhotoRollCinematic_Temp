name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Create launcher icons with Python
        run: |
          pip install pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          sizes = {
            "mipmap-mdpi": 48,
            "mipmap-hdpi": 72,
            "mipmap-xhdpi": 96,
            "mipmap-xxhdpi": 144,
            "mipmap-xxxhdpi": 192,
          }

          for folder, size in sizes.items():
            path = f"app/src/main/res/{folder}"
            os.makedirs(path, exist_ok=True)
            img = Image.new("RGB", (size, size), color=(37, 99, 235))
            draw = ImageDraw.Draw(img)
            margin = size // 8
            draw.ellipse([margin, margin, size - margin, size - margin], fill=(29, 78, 216))
            font_size = size // 4
            try:
              font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", font_size)
            except:
              font = ImageFont.load_default()
            text = "PC"
            bbox = draw.textbbox((0, 0), text, font=font)
            tw = bbox[2] - bbox[0]
            th = bbox[3] - bbox[1]
            draw.text(((size - tw) / 2, (size - th) / 2), text, fill="white", font=font)
            img.save(f"{path}/ic_launcher.png")
            img.save(f"{path}/ic_launcher_round.png")
            print(f"Created {folder} ({size}x{size})")
          PYEOF

      - name: Remove XML launcher icons (replaced by PNG)
        run: |
          find app/src/main/res/mipmap-* -name "*.xml" -delete
          echo "Removed XML icon files"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        working-directory: ${{ github.workspace }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoRollCinematic-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
